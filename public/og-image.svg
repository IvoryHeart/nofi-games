<svg width="1200" height="630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FEF0E4"/>
      <stop offset="100%" stop-color="#F5E2CC"/>
    </linearGradient>
    <linearGradient id="logo" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#8B5E83"/>
      <stop offset="100%" stop-color="#E89040"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <!-- Logo icon -->
  <g transform="translate(460, 120)">
    <rect width="120" height="120" rx="26" fill="url(#logo)"/>
    <g fill="#FEF0E4">
      <rect x="41" y="26" width="8" height="68"/>
      <rect x="49" y="34" width="8" height="52"/>
      <rect x="57" y="42" width="8" height="36"/>
      <rect x="65" y="50" width="8" height="20"/>
      <rect x="73" y="58" width="8" height="4"/>
    </g>
  </g>
  <!-- Brand name -->
  <text x="600" y="310" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="72" font-weight="800" fill="#8B5E83">NoFi.Games</text>
  <!-- Tagline -->
  <text x="600" y="380" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="32" font-weight="500" fill="#3D2B35">Play offline, anywhere. No wifi needed.</text>
  <!-- Game count -->
  <text x="600" y="440" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="24" font-weight="400" fill="#8B7B83">16 free casual games</text>
  <!-- Bottom accent bar -->
  <rect x="0" y="610" width="1200" height="20" fill="#8B5E83" opacity="0.3"/>
</svg>
