<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <meta name="theme-color" content="#8B5E83" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="description" content="NoFi.Games — Casual offline games collection. Play anywhere, no wifi needed. 16 free games: 2048, Sudoku, Snake, Wordle, Minesweeper and more." />
  <meta name="robots" content="index, follow" />
  <meta property="og:title" content="NoFi.Games — Play Offline, Anywhere" />
  <meta property="og:description" content="16 casual games that work without wifi. Free, no ads, instant play." />
  <meta property="og:type" content="website" />
  <meta property="og:url" content="https://nofi.games/" />
  <title>NoFi.Games — Casual Offline Games Collection</title>
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  <link rel="apple-touch-icon" href="/icons/icon-192.png" />
  <link rel="canonical" href="https://nofi.games/" />
  <!-- Inline critical CSS so the loading shell renders BEFORE the full CSS downloads.
       This eliminates the blank-screen gap and gives us a near-instant FCP. -->
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    html,body{height:100%;overflow:hidden;font-family:'Inter',system-ui,-apple-system,sans-serif;-webkit-font-smoothing:antialiased}
    body{background:#FEF0E4;color:#3D2B35}
    #app{height:100%;display:flex;flex-direction:column}
    .boot-shell{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;gap:16px}
    .boot-brand{font-size:28px;font-weight:800;color:#8B5E83;letter-spacing:-0.5px}
    .boot-spinner{width:28px;height:28px;border:3px solid rgba(139,94,131,0.2);border-top-color:#8B5E83;border-radius:50%;animation:spin .6s linear infinite}
    @keyframes spin{to{transform:rotate(360deg)}}
  </style>
</head>
<body>
  <!-- Static loading shell: paints immediately, no JS required. The main.ts
       script replaces this content once the app is bootstrapped. -->
  <div id="app" role="application" aria-label="NoFi.Games">
    <div class="boot-shell">
      <svg width="72" height="72" viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg">
        <defs>
          <linearGradient id="bootLg" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#8B5E83"/>
            <stop offset="100%" stop-color="#E89040"/>
          </linearGradient>
        </defs>
        <rect width="64" height="64" rx="14" fill="url(#bootLg)"/>
        <g fill="#FEF0E4">
          <rect x="22" y="14" width="4" height="36"/>
          <rect x="26" y="18" width="4" height="28"/>
          <rect x="30" y="22" width="4" height="20"/>
          <rect x="34" y="26" width="4" height="12"/>
          <rect x="38" y="30" width="4" height="4"/>
        </g>
      </svg>
      <div class="boot-brand">NoFi.Games</div>
      <div class="boot-spinner"></div>
    </div>
  </div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
