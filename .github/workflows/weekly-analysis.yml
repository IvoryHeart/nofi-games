name: Weekly Game Analysis

on:
  schedule:
    - cron: '0 9 * * 1'  # Every Monday at 9 AM UTC
  workflow_dispatch:       # Manual trigger from Actions tab

env:
  SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
  SUPABASE_PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF }}

permissions:
  issues: write
  contents: read

jobs:
  analyze:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Run telemetry analysis
        id: analyze
        run: |
          node scripts/analyze.mjs > /tmp/analysis.md 2>&1 || true
          # Write multiline output safely
          {
            echo 'report<<ANALYSIS_EOF'
            cat /tmp/analysis.md
            echo 'ANALYSIS_EOF'
          } >> "$GITHUB_OUTPUT"

      - name: Run autoplay agent
        id: autoplay
        run: |
          npx vitest run --config vitest.autoplay.ts --reporter verbose > /tmp/autoplay-raw.txt 2>&1 || true
          # Extract the formatted report between the ═══ markers
          python3 -c "
          import re, sys
          txt = open('/tmp/autoplay-raw.txt').read()
          m = re.search(r'(═{40,}.*?═{40,}\n\n.*?)(?=\n [✓×]|\Z)', txt, re.DOTALL)
          if m: print(m.group(1))
          else: print('_Autoplay did not produce results._')
          " > /tmp/autoplay.md
          {
            echo 'report<<AUTOPLAY_EOF'
            cat /tmp/autoplay.md
            echo 'AUTOPLAY_EOF'
          } >> "$GITHUB_OUTPUT"

      - name: Create GitHub Issue
        uses: actions/github-script@v7
        with:
          script: |
            const date = new Date().toISOString().slice(0, 10);
            const sha = context.sha.slice(0, 7);
            const telemetry = process.env.TELEMETRY_REPORT || '_No telemetry data._';
            const autoplay = process.env.AUTOPLAY_REPORT || '_No autoplay data._';

            const body = [
              `# 📊 Weekly Analysis — ${date}`,
              `**Version**: \`${sha}\` · [Live deployment](https://nofi.games)`,
              ``,
              `---`,
              ``,
              `## Real Player Telemetry`,
              ``,
              telemetry,
              ``,
              `---`,
              ``,
              `## Auto-Play Agent (synthetic baseline)`,
              ``,
              '```',
              autoplay,
              '```',
              ``,
              `---`,
              ``,
              `## Action Items`,
              ``,
              `Review the data above and check off as you go:`,
              ``,
              `- [ ] Fix any game with Easy win rate < 40%`,
              `- [ ] Tighten any game with Hard win rate > 70%`,
              `- [ ] Investigate confusion hotspots (avg > 3)`,
              `- [ ] Improve discoverability for low-play-count games`,
              `- [ ] Fix any autoplay crashes (regressions)`,
              `- [ ] Compare with [last week's issue](../../issues?q=label%3Aanalysis+is%3Aissue)`,
              ``,
              `---`,
              `_Generated by the [weekly analysis pipeline](../../actions/workflows/weekly-analysis.yml). Run manually from the Actions tab._`,
            ].join('\n');

            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `📊 Weekly Analysis — ${date} (${sha})`,
              body: body,
              labels: ['analysis', 'automated'],
            });
        env:
          TELEMETRY_REPORT: ${{ steps.analyze.outputs.report }}
          AUTOPLAY_REPORT: ${{ steps.autoplay.outputs.report }}
