<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <meta name="theme-color" content="#C9883F" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="description" content="Dice Tycoon — roll, build and raid your way around the board. A standalone offline tycoon game from NoFi.Games. No wifi needed." />
  <meta name="robots" content="index, follow" />
  <meta property="og:title" content="Dice Tycoon — Roll, Build, Raid" />
  <meta property="og:description" content="Roll the dice, build your empire, raid your rivals. Free, offline, instant play." />
  <meta property="og:type" content="website" />
  <meta property="og:url" content="https://tycoon.nofi.games/" />
  <title>Dice Tycoon</title>
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  <link rel="apple-touch-icon" href="/icons/icon-192.png" />
  <link rel="canonical" href="https://tycoon.nofi.games/" />
  <!-- Inline critical CSS so the loading shell renders BEFORE the full CSS downloads.
       Mirrors index.html's instant-paint pattern, branded for Dice Tycoon. -->
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    html,body{height:100%;overflow:hidden;font-family:'Inter',system-ui,-apple-system,sans-serif;-webkit-font-smoothing:antialiased}
    body{background:#FEF0E4;color:#3D2B35}
    #app{height:100%;display:flex;flex-direction:column}
    .boot-shell{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;gap:16px}
    .boot-brand{font-size:28px;font-weight:800;color:#C9883F;letter-spacing:-0.5px}
    .boot-spinner{width:28px;height:28px;border:3px solid rgba(201,136,63,0.2);border-top-color:#C9883F;border-radius:50%;animation:spin .6s linear infinite}
    @keyframes spin{to{transform:rotate(360deg)}}
  </style>
</head>
<body>
  <!-- Static loading shell: paints immediately, no JS required. tycoon main.ts
       replaces this content once the app is bootstrapped. -->
  <div id="app" role="application" aria-label="Dice Tycoon">
    <div class="boot-shell">
      <svg width="72" height="72" viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg">
        <defs>
          <linearGradient id="bootLg" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#C9883F"/>
            <stop offset="100%" stop-color="#E8B85C"/>
          </linearGradient>
        </defs>
        <rect width="64" height="64" rx="14" fill="url(#bootLg)"/>
        <rect x="14" y="14" width="36" height="36" rx="7" fill="#FEF0E4"/>
        <circle cx="24" cy="24" r="3.5" fill="#C9883F"/>
        <circle cx="40" cy="24" r="3.5" fill="#C9883F"/>
        <circle cx="32" cy="32" r="3.5" fill="#C9883F"/>
        <circle cx="24" cy="40" r="3.5" fill="#C9883F"/>
        <circle cx="40" cy="40" r="3.5" fill="#C9883F"/>
      </svg>
      <div class="boot-brand">Dice Tycoon</div>
      <div class="boot-spinner"></div>
    </div>
  </div>
  <script type="module" src="/src/tycoon/main.ts"></script>
</body>
</html>
